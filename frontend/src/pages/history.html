<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dear Mind - History</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      background: #f3f0ff;
      min-height: 100vh;
      margin: 0;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: linear-gradient(160deg, rgb(123,94,208) 30%, rgba(196,181,253,1) 100%);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .sidebar-logo img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .sidebar-logo span {
      color: white;
      font-size: 18px;
      font-weight: 800;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .sidebar-item:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar-item.active {
      background: rgba(255,255,255,0.2);
      color: white;
      font-weight: 700;
    }

    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
    }

    .sidebar-logout:hover {
      background: rgba(255,0,0,0.15);
      color: #fca5a5;
    }

    /* ── Mobile Header ── */
    .mobile-header {
      display: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      padding: 16px 20px;
      align-items: center;
      gap: 12px;
    }

    .mobile-header img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .mobile-header span {
      color: white;
      font-size: 18px;
      font-weight: 800;
    }

    /* ── Main Content ── */
    .main-content {
      margin-left: 240px;
      flex: 1;
      padding: 30px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      color: #4c1d95;
      margin-bottom: 6px;
    }

    .page-sub {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* ── Search & Filter ── */
    .filter-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-input {
      /* flex: 1; */
      min-width: 200px;
      padding: 12px 18px;
      border-radius: 30px;
      border: 1px solid #e9d5ff;
      background: white;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: #1f2937;
      outline: none;
      transition: border 0.2s;
    }

    .search-input:focus {
      border-color: #7c3aed;
    }

    .filter-btn {
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid #e9d5ff;
      background: white;
      color: #7c3aed;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #7c3aed;
      color: white;
      border-color: #7c3aed;
    }

    /* ── History Layout ── */
    .history-layout {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 24px;
      align-items: start;
    }

    /* ── Entry List ── */
    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .entry-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      box-shadow: 0 2px 10px rgba(124,58,237,0.06);
    }

    .entry-card:hover {
      border-color: #c4b5fd;
      transform: translateX(4px);
    }

    .entry-card.selected {
      border-color: #7c3aed;
      background: #faf5ff;
    }

    .entry-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .entry-emoji { font-size: 28px; }

    .entry-meta { flex: 1; }

    .entry-emotion {
      font-size: 13px;
      font-weight: 700;
      color: #4c1d95;
      text-transform: capitalize;
    }

    .entry-date {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .entry-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .badge-positive { background: #dcfce7; color: #16a34a; }
    .badge-negative { background: #fee2e2; color: #dc2626; }
    .badge-neutral  { background: #f3f4f6; color: #6b7280; }

    .entry-preview {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Detail Panel ── */
    .detail-panel {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.08);
      position: sticky;
      top: 20px;
    }

    .detail-empty {
      text-align: center;
      padding: 40px 20px;
      color: #c4b5fd;
    }

    .detail-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .detail-empty p { font-size: 13px; color: #9ca3af; }

    /* Detail content */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f3e8ff;
    }

    .detail-emoji { font-size: 44px; }

    .detail-emotion {
      font-size: 20px;
      font-weight: 800;
      color: #4c1d95;
      text-transform: capitalize;
    }

    .detail-date {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .detail-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-top: 4px;
      display: inline-block;
    }

    .detail-text {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.8;
      margin-bottom: 20px;
      padding: 16px;
      background: #faf5ff;
      border-radius: 12px;
      border-left: 3px solid #7c3aed;
      max-height: 150px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Summary */
    .detail-summary {
      font-size: 13px;
      color: #4b5563;
      font-style: italic;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* Emotion bars */
    .emotion-bar-wrap { margin-bottom: 8px; }

    .emotion-bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 3px;
    }

    .emotion-bar-bg {
      height: 6px;
      background: #f3e8ff;
      border-radius: 3px;
      overflow: hidden;
    }

    .emotion-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    /* Themes */
    .themes-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .theme-tag {
      padding: 3px 10px;
      background: #f3e8ff;
      color: #7c3aed;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Suggestions */
    .suggestion-item {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #4b5563;
      line-height: 1.6;
    }

    .suggestion-num {
      color: #7c3aed;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* Delete button */
    .delete-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border-radius: 30px;
      border: 2px solid #fee2e2;
      background: transparent;
      color: #dc2626;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #fee2e2;
    }

    /* Loader */
    .loader {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 13px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e9d5ff;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Mobile Bottom Nav ── */
    .bottom-nav { display: none; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-header { display: flex !important; }

      .main-content {
        margin-left: 0;
        padding: 16px;
        padding-bottom: 90px;
      }

      .history-layout { grid-template-columns: 1fr; }

      .detail-panel { position: static; }

      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(243,240,255,0.97);
        backdrop-filter: blur(10px);
        justify-content: space-around;
        align-items: center;
        padding: 10px 0 16px;
        border-top: 1px solid #e9d5ff;
        z-index: 100;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        text-decoration: none;
        color: #9ca3af;
        font-size: 10px;
        font-weight: 500;
      }

      .nav-item.active { color: #7c3aed; }
      .nav-icon { font-size: 22px; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.png" alt="Dear Mind" />
      <span>Dear Mind 💭</span>
    </div>
    <nav class="sidebar-nav">
      <a href="./home.html" class="sidebar-item">
        <span>🏠</span> Home
      </a>
      <a href="./journal.html" class="sidebar-item">
        <span>✍️</span> Write Journal
      </a>
      <a href="./dashboard.html" class="sidebar-item">
        <span>📊</span> Dashboard
      </a>
      <a href="./history.html" class="sidebar-item active">
        <span>📋</span> History
      </a>
      <a href="./chat.html" class="sidebar-item">
        <span>🤖</span> Nova - Chatbot
      </a>
    </nav>
    <button class="sidebar-logout" onclick="handleLogout()">
      <span>🚪</span> Logout
    </button>
  </aside>

  <!-- ── Mobile Header ── -->
  <div class="mobile-header">
    <img src="../assets/logo.png" alt="Dear Mind" />
    <span>Dear Mind 💭</span>
  </div>

  <!-- ── Main Content ── -->
  <main class="main-content">

    <h1 class="page-title">📋 Journal History</h1>
    <p class="page-sub">Browse and review your past entries</p>

    <!-- Search & Filter -->
    <div class="filter-row">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="🔍 Search entries..."
        oninput="filterEntries()"
      />
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Positive', this)">😊 Positive</button>
      <button class="filter-btn" onclick="setFilter('Neutral', this)">😐 Neutral</button>
      <button class="filter-btn" onclick="setFilter('Negative', this)">😢 Negative</button>
    </div>

    <!-- History Layout -->
    <div class="history-layout">

      <!-- Entries List -->
      <div>
        <div id="entries-container">
          <div class="loader">
            <div class="spinner"></div>
            Loading entries...
          </div>
        </div>
      </div>

      <!-- Detail Panel -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-empty">
          <div class="empty-icon">📖</div>
          <p>Select an entry to view details</p>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a href="./home.html" class="nav-item">
    <span class="nav-icon">🏠</span> Home
  </a>
  <a href="./journal.html" class="nav-item">
    <span class="nav-icon">✍️</span> Write
  </a>
  <a href="./dashboard.html" class="nav-item">
    <span class="nav-icon">📊</span> Stats
  </a>
  <a href="./history.html" class="nav-item active">
    <span class="nav-icon">📋</span> History
  </a>
  <a href="./chat.html" class="nav-item">
    <span class="nav-icon">🤖</span> Nova
  </a>
</nav>

<script type="module">
  import { getJournals, deleteJournal } from '../js/api.js';
  import { requireAuth, logout } from '../js/auth.js';
  import { getEmotionEmoji, getEmotionColor, formatDate } from '../js/utils.js';

  requireAuth();

  window.handleLogout = () => logout();

  let allJournals = [];
  let currentFilter = 'all';
  let selectedId = null;

  // Load all journals
  const loadJournals = async () => {
    const container = document.getElementById('entries-container');
    try {
      allJournals = await getJournals();
      renderList(allJournals);
    } catch (e) {
      container.innerHTML =
        '<div class="loader">Failed to load entries.</div>';
    }
  };

  // Render list
  const renderList = (journals) => {
    const container = document.getElementById('entries-container');

    if (!journals.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <p>No entries found.<br/>
          <a href="./journal.html" style="color:#7c3aed;font-weight:700;">
            Write your first journal!
          </a></p>
        </div>`;
      return;
    }

    container.innerHTML = `
      <div class="entries-list">
        ${journals.map(j => `
          <div class="entry-card ${selectedId === j._id ? 'selected' : ''}"
            onclick="selectEntry('${j._id}')">
            <div class="entry-card-top">
              <span class="entry-emoji">
                ${getEmotionEmoji(j.primaryEmotion)}
              </span>
              <div class="entry-meta">
                <div class="entry-emotion">
                  ${j.primaryEmotion || 'neutral'}
                </div>
                <div class="entry-date">${formatDate(j.createdAt)}</div>
              </div>
              <span class="entry-badge badge-${(j.sentimentLabel||'neutral').toLowerCase()}">
                ${j.sentimentLabel || 'Neutral'}
              </span>
            </div>
            <div class="entry-preview">
              ${j.summary || j.text.slice(0, 80)}
            </div>
          </div>`).join('')}
      </div>`;
  };

  // Select entry → show detail
  window.selectEntry = (id) => {
    selectedId = id;
    const journal = allJournals.find(j => j._id === id);
    if (!journal) return;

    // Update selected state
    document.querySelectorAll('.entry-card')
      .forEach(c => c.classList.remove('selected'));
    event.currentTarget.classList.add('selected');

    showDetail(journal);
  };

  // Show detail panel
  const showDetail = (j) => {
    const panel = document.getElementById('detail-panel');
    const emotions = j.emotions || {};

    panel.innerHTML = `
      <div class="fade-in">

        <!-- Header -->
        <div class="detail-header">
          <span class="detail-emoji">${getEmotionEmoji(j.primaryEmotion)}</span>
          <div>
            <div class="detail-emotion">${j.primaryEmotion || 'neutral'}</div>
            <div class="detail-date">${formatDate(j.createdAt)}</div>
            <span class="detail-badge badge-${(j.sentimentLabel||'neutral').toLowerCase()}">
              ${j.sentimentLabel || 'Neutral'}
              (${j.sentimentScore > 0 ? '+' : ''}${j.sentimentScore || 0})
            </span>
          </div>
        </div>

        <!-- Journal text -->
        <p class="section-label">Journal Entry</p>
        <div class="detail-text">${j.text}</div>

        <!-- Summary -->
        <p class="section-label">AI Summary</p>
        <p class="detail-summary">"${j.summary || 'No summary available.'}"</p>

        <!-- Emotion bars -->
        <p class="section-label">Emotion Breakdown</p>
        <div style="margin-bottom:16px;">
          ${Object.entries(emotions)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5)
            .map(([em, score]) => `
              <div class="emotion-bar-wrap">
                <div class="emotion-bar-header">
                  <span>${getEmotionEmoji(em)} ${em}</span>
                  <span>${score}%</span>
                </div>
                <div class="emotion-bar-bg">
                  <div class="emotion-bar-fill"
                    style="width:${score}%;
                           background:${getEmotionColor(em)};">
                  </div>
                </div>
              </div>`).join('')}
        </div>

        <!-- Themes -->
        ${j.themes?.length ? `
          <p class="section-label">Themes</p>
          <div class="themes-wrap">
            ${j.themes.map(t => `
              <span class="theme-tag">#${t}</span>`).join('')}
          </div>` : ''}

        <!-- Suggestions -->
        ${j.suggestions?.length ? `
          <p class="section-label">✦ AI Suggestions</p>
          ${j.suggestions.map((s, i) => `
            <div class="suggestion-item">
              <span class="suggestion-num">${i + 1}.</span>
              <span>${s}</span>
            </div>`).join('')}` : ''}

        <!-- Delete -->
        <button class="delete-btn" onclick="handleDelete('${j._id}')">
          🗑️ Delete Entry
        </button>
      </div>`;
  };

  // Filter entries
  window.setFilter = (filter, btn) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn')
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  };

  window.filterEntries = () => applyFilters();

  const applyFilters = () => {
    const search = document.getElementById('search-input').value.toLowerCase();
    let filtered = allJournals;

    if (currentFilter !== 'all') {
      filtered = filtered.filter(j => j.sentimentLabel === currentFilter);
    }

    if (search) {
      filtered = filtered.filter(j =>
        j.text.toLowerCase().includes(search) ||
        (j.primaryEmotion || '').toLowerCase().includes(search) ||
        (j.summary || '').toLowerCase().includes(search)
      );
    }

    renderList(filtered);
  };

  // Delete entry
  window.handleDelete = async (id) => {
    if (!confirm('Are you sure you want to delete this entry?')) return;

    try {
      await deleteJournal(id);
      allJournals = allJournals.filter(j => j._id !== id);
      selectedId = null;
      document.getElementById('detail-panel').innerHTML = `
        <div class="detail-empty">
          <div class="empty-icon">📖</div>
          <p>Entry deleted successfully!</p>
        </div>`;
      applyFilters();
    } catch (e) {
      alert('Failed to delete entry. Please try again.');
    }
  };

  loadJournals();
</script>

</body>
</html>
