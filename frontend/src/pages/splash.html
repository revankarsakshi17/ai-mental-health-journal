<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dear Mind</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      background: linear-gradient(160deg, #4c1d95 0%, #6d28d9 50%, #8b5cf6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(167, 139, 250, 0.25);
      filter: blur(80px);
      z-index: 0;
    }

    .splash-logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      z-index: 1;
      animation: pulse 2s infinite;
      filter: drop-shadow(0 0 30px rgba(196,181,253,0.4));
    }

    .splash-title {
      color: white;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      z-index: 1;
      margin-top: 16px;
    }

    .splash-subtitle {
      color: #ddd6fe;
      font-size: 16px;
      z-index: 1;
      margin-top: 8px;
    }

    .splash-tagline {
      color: #c4b5fd;
      font-size: 13px;
      margin-top: 60px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot-loader {
      display: flex;
      gap: 4px;
    }

    .dot-loader span {
      width: 6px;
      height: 6px;
      background: #c4b5fd;
      border-radius: 50%;
      animation: bounce 0.8s infinite alternate;
    }

    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      from { transform: translateY(0); opacity: 0.4; }
      to   { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <img src="../assets/logo.png" alt="Dear Mind" class="splash-logo" />
  <h1 class="splash-title">DEAR MIND</h1>
  <p class="splash-subtitle">💭 Your safe space to reflect</p>
  <div class="splash-tagline">
    Preparing your journal
    <div class="dot-loader">
      <span></span><span></span><span></span>
    </div>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = './login.html';
    }, 3000);
  </script>
</body>
</html>
