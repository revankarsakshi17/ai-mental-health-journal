<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dear Mind - Login</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #3b0764 0%, #5b21b6 40%, #7c3aed 70%, #a78bfa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .circle {
      position: fixed;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .c1 { width:300px; height:300px; top:-100px; left:-100px; }
    .c2 { width:180px; height:180px; top:20px; left:20px; border-color: rgba(255,255,255,0.12); }
    .c3 { width:350px; height:350px; bottom:-120px; right:-120px; }
    .c4 { width:200px; height:200px; bottom:-40px; right:-40px; border-color: rgba(255,255,255,0.12); }

    .wrapper {
      width: 95%;
      max-width: 900px;
      min-height: 560px;
      display: flex;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .left-panel {
      width: 42%;
      background: linear-gradient(160deg, #5b21b6 0%, #4c1d95 50%, #3b0764 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      width: 250px; height: 250px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      top: -80px; right: -80px;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      bottom: -60px; left: -60px;
    }

    .logo {
      width: 110px;
      height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(196,181,253,0.5));
      animation: pulse 2s infinite;
      z-index: 1;
    }

    .app-name {
      color: white;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 4px;
      text-align: center;
      z-index: 1;
    }

    .app-tagline {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
      z-index: 1;
    }

    .toggle-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 20px;
      z-index: 1;
    }

    .toggle-btn {
      padding: 12px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
      text-align: center;
    }

    .toggle-btn.active {
      background: white;
      color: #7c3aed;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .toggle-btn.inactive {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 2px solid rgba(255,255,255,0.3);
    }

    .toggle-btn.inactive:hover {
      border-color: white;
      color: white;
    }

    .right-panel {
      flex: 1;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    .form-section {
      display: none;
      flex-direction: column;
      animation: fadeIn 0.4s ease;
    }

    .form-section.active { display: flex; }

    .form-icon { font-size: 42px; text-align: center; margin-bottom: 8px; }

    .form-title {
      color: white;
      font-size: 26px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 3px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 24px;
      padding-bottom: 10px;
      transition: border-color 0.2s;
    }

    .input-group:focus-within { border-bottom-color: #c4b5fd; }

    .input-icon { font-size: 18px; opacity: 0.7; }

    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.35); }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .forgot { color: #c4b5fd; font-size: 12px; cursor: pointer; }

    .submit-btn {
      padding: 12px 32px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: white;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
      transition: all 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(124,58,237,0.5);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    .divider-text { color: rgba(255,255,255,0.4); font-size: 11px; }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }

    .social-btn:hover { background: rgba(255,255,255,0.12); }

    .error-msg {
      display: none;
      color: #fca5a5;
      font-size: 12px;
      margin-bottom: 16px;
      text-align: center;
      background: rgba(220,38,38,0.2);
      padding: 8px 16px;
      border-radius: 10px;
    }

    .success-msg {
      display: none;
      color: #86efac;
      font-size: 12px;
      margin-bottom: 16px;
      text-align: center;
      background: rgba(22,163,74,0.2);
      padding: 8px 16px;
      border-radius: 10px;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 600px) {
      .wrapper { flex-direction: column; min-height: 100vh; border-radius: 0; width: 100%; }
      .left-panel { width: 100%; min-height: auto; padding: 30px 20px; flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .toggle-btns { flex-direction: row; margin-top: 10px; }
      .right-panel { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="circle c4"></div>

  <div class="wrapper">
    <div class="left-panel">
      <img src="../assets/logo.png" alt="Dear Mind" class="logo" />
      <h1 class="app-name">DEAR MIND</h1>
      <p class="app-tagline">💭 Your safe space to reflect</p>
      <div class="toggle-btns">
        <div class="toggle-btn active" id="btn-login" onclick="showLogin()">SIGN IN</div>
        <div class="toggle-btn inactive" id="btn-register" onclick="showRegister()">SIGN UP</div>
      </div>
    </div>

    <div class="right-panel">
      <!-- LOGIN -->
      <div class="form-section active" id="login-form">
        <div class="form-icon">👤</div>
        <h2 class="form-title">LOGIN</h2>
        <p class="error-msg" id="login-error"></p>
        <div class="input-group">
          <span class="input-icon">📧</span>
          <input type="email" id="login-email" placeholder="Email" />
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="Password" />
        </div>
        <div class="bottom-row">
          <span class="forgot">Forgot Password?</span>
          <button class="submit-btn" id="login-btn" onclick="handleLogin()">LOGIN</button>
        </div>
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">Or Login With</span>
          <div class="divider-line"></div>
        </div>
        <button class="social-btn">
          <img src="https://www.google.com/favicon.ico" width="16" /> Google
        </button>
      </div>

      <!-- REGISTER -->
      <div class="form-section" id="register-form">
        <div class="form-icon">🌸</div>
        <h2 class="form-title">CREATE ACCOUNT</h2>
        <p class="error-msg" id="register-error"></p>
        <p class="success-msg" id="register-success"></p>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="reg-name" placeholder="Full Name" />
        </div>
        <div class="input-group">
          <span class="input-icon">📧</span>
          <input type="email" id="reg-email" placeholder="Email" />
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="reg-password" placeholder="Password" />
        </div>
        <div class="bottom-row">
          <span class="forgot" onclick="showLogin()">Already have account?</span>
          <button class="submit-btn" id="register-btn" onclick="handleRegister()">SIGN UP</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginUser, registerUser } from '../js/api.js';
    import { saveAuth, isLoggedIn } from '../js/auth.js';

    if (isLoggedIn()) window.location.href = './home.html';

    window.showLogin = () => {
      document.getElementById('login-form').classList.add('active');
      document.getElementById('register-form').classList.remove('active');
      document.getElementById('btn-login').className = 'toggle-btn active';
      document.getElementById('btn-register').className = 'toggle-btn inactive';
    };

    window.showRegister = () => {
      document.getElementById('register-form').classList.add('active');
      document.getElementById('login-form').classList.remove('active');
      document.getElementById('btn-register').className = 'toggle-btn active';
      document.getElementById('btn-login').className = 'toggle-btn inactive';
    };

    window.handleLogin = async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      if (!email || !password) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
      btn.textContent = 'Loading...'; btn.disabled = true;
      try {
        const data = await loginUser(email, password);
        if (data.token) { saveAuth(data.token, { name: data.name, email: data.email }); window.location.href = './home.html'; }
        else { err.textContent = data.message || 'Login failed.'; err.style.display = 'block'; }
      } catch (e) { err.textContent = 'Something went wrong.'; err.style.display = 'block'; }
      finally { btn.textContent = 'LOGIN'; btn.disabled = false; }
    };

    window.handleRegister = async () => {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      const btn = document.getElementById('register-btn');
      const err = document.getElementById('register-error');
      const success = document.getElementById('register-success');
      err.style.display = 'none'; success.style.display = 'none';
      if (!name || !email || !password) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
      if (password.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
      btn.textContent = 'Creating...'; btn.disabled = true;
      try {
        const data = await registerUser(name, email, password);
        if (data.id || data._id) { success.textContent = 'Account created! Please login.'; success.style.display = 'block'; setTimeout(() => showLogin(), 1500); }
        else { err.textContent = data.message || 'Registration failed.'; err.style.display = 'block'; }
      } catch (e) { err.textContent = 'Something went wrong.'; err.style.display = 'block'; }
      finally { btn.textContent = 'SIGN UP'; btn.disabled = false; }
    };

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('login-form').classList.contains('active')) handleLogin();
      else handleRegister();
    });
  </script>
</body>
</html>
