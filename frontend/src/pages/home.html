<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dear Mind - Home</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      background: #f3f0ff;
      min-height: 100vh;
      margin: 0;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar (Desktop) ── */
    .sidebar {
      width: 240px;
      background: linear-gradient(160deg, #4c1d95, #7c3aed);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .sidebar-logo img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .sidebar-logo span {
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .sidebar-item:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar-item.active {
      background: rgba(255,255,255,0.2);
      color: white;
      font-weight: 700;
    }

    .sidebar-item .nav-icon { font-size: 20px; }

    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
    }

    .sidebar-logout:hover {
      background: rgba(255,0,0,0.15);
      color: #fca5a5;
    }

    /* ── Mobile Header ── */
    .mobile-header {
      display: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      padding: 16px 20px;
      align-items: center;
      gap: 12px;
    }

    .mobile-header img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .mobile-header span {
      color: white;
      font-size: 18px;
      font-weight: 800;
    }

    /* ── Main Content ── */
    .main-content {
      margin-left: 240px;
      flex: 1;
      padding: 30px;
    }

    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .greeting {
      font-size: 28px;
      font-weight: 800;
      color: #4c1d95;
      margin-bottom: 4px;
    }

    .greeting-sub {
      color: #6b7280;
      font-size: 13px;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(124,58,237,0.08);
      text-align: center;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-3px); }

    .stat-icon { font-size: 32px; margin-bottom: 8px; }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      color: #7c3aed;
      text-transform: capitalize;
    }

    .stat-label {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* ── Two Column ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Mood Card ── */
    .mood-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.08);
    }

    .mood-card-title {
      color: #4b5563;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .emoji-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .emoji-btn {
      font-size: 34px;
      cursor: pointer;
      transition: transform 0.2s;
      background: none;
      border: none;
      padding: 6px;
      border-radius: 50%;
    }

    .emoji-btn:hover { transform: scale(1.3); }

    .emoji-btn.selected {
      background: #f3e8ff;
      transform: scale(1.2);
    }

    .write-btn {
      width: 100%;
      padding: 16px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg, #9b59b6, #7c3aed);
      color: white;
      font-weight: 700;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(124,58,237,0.3);
      transition: all 0.2s;
    }

    .write-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124,58,237,0.4);
    }

    /* ── Recent Entries ── */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #4c1d95;
      margin-bottom: 16px;
    }

    .entry-item {
      background: #faf5ff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: 1px solid #f3e8ff;
    }

    .entry-item:hover {
      background: #f3e8ff;
      transform: translateX(4px);
    }

    .entry-emoji { font-size: 28px; }

    .entry-info { flex: 1; overflow: hidden; }

    .entry-summary {
      font-size: 13px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-date { font-size: 11px; color: #9ca3af; }

    .entry-sentiment {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .sentiment-positive { background: #dcfce7; color: #16a34a; }
    .sentiment-negative { background: #fee2e2; color: #dc2626; }
    .sentiment-neutral  { background: #f3f4f6; color: #6b7280; }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #9ca3af;
    }

    .empty-icon { font-size: 40px; margin-bottom: 10px; }

    .loader {
      text-align: center;
      padding: 20px;
      color: #9ca3af;
      font-size: 13px;
    }

    /* ── Mobile Bottom Nav ── */
    .bottom-nav { display: none; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }

      .mobile-header { display: flex !important; }

      .main-content {
        margin-left: 0;
        padding: 16px;
        padding-bottom: 90px;
      }

      .stats-row { grid-template-columns: 1fr 1fr; }

      .two-col { grid-template-columns: 1fr; }

      .greeting { font-size: 22px; }

      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(243,240,255,0.97);
        backdrop-filter: blur(10px);
        justify-content: space-around;
        align-items: center;
        padding: 10px 0 16px;
        border-top: 1px solid #e9d5ff;
        z-index: 100;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        text-decoration: none;
        color: #9ca3af;
        font-size: 10px;
        font-weight: 500;
      }

      .nav-item.active { color: #7c3aed; }
      .nav-icon { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar (Desktop) ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.png" alt="Dear Mind" />
      <span>Dear Mind 💭</span>
    </div>
    <nav class="sidebar-nav">
      <a href="./home.html" class="sidebar-item active">
        <span class="nav-icon">🏠</span> Home
      </a>
      <a href="./journal.html" class="sidebar-item">
        <span class="nav-icon">✍️</span> Write Journal
      </a>
      <a href="./dashboard.html" class="sidebar-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="./history.html" class="sidebar-item">
        <span class="nav-icon">📋</span> History
      </a>
      <a href="./chat.html" class="sidebar-item">
        <span class="nav-icon">🤖</span> AI Chat
      </a>
    </nav>
    <button class="sidebar-logout" onclick="handleLogout()">
      <span class="nav-icon">🚪</span> Logout
    </button>
  </aside>

  <!-- ── Mobile Header ── -->
  <div class="mobile-header">
    <img src="../assets/logo.png" alt="Dear Mind" />
    <span>Dear Mind 💭</span>
  </div>

  <!-- ── Main Content ── -->
  <main class="main-content">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <h1 class="greeting" id="greeting">Hello! 👋</h1>
        <p class="greeting-sub" id="greeting-sub">How are you feeling today?</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">📓</div>
        <div class="stat-value" id="total-entries">-</div>
        <div class="stat-label">Total Entries</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🧠</div>
        <div class="stat-value" id="avg-sentiment">-</div>
        <div class="stat-label">Avg Sentiment</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💜</div>
        <div class="stat-value" id="dominant-emotion">-</div>
        <div class="stat-label">Top Emotion</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✨</div>
        <div class="stat-value" id="positive-days">-</div>
        <div class="stat-label">Positive Days</div>
      </div>
    </div>

    <!-- Two Column -->
    <div class="two-col">

      <!-- Mood Picker -->
      <div class="mood-card">
        <p class="mood-card-title">Today's Mood 🌸</p>
        <div class="emoji-row">
          <button class="emoji-btn" onclick="selectMood(this,'happy')"     title="Happy">😊</button>
          <button class="emoji-btn" onclick="selectMood(this,'excited')"   title="Excited">😂</button>
          <button class="emoji-btn" onclick="selectMood(this,'celebrate')" title="Celebrate">🥳</button>
          <button class="emoji-btn" onclick="selectMood(this,'calm')"      title="Calm">😌</button>
          <button class="emoji-btn" onclick="selectMood(this,'neutral')"   title="Neutral">😐</button>
          <button class="emoji-btn" onclick="selectMood(this,'sad')"       title="Sad">😔</button>
          <button class="emoji-btn" onclick="selectMood(this,'crying')"    title="Crying">😢</button>
        </div>
        <button class="write-btn" onclick="window.location.href='./journal.html'">
          ✍️ Write Journal
        </button>
      </div>

      <!-- Recent Entries -->
      <div class="mood-card">
        <p class="section-title">Recent Entries</p>
        <div id="recent-entries">
          <div class="loader">Loading entries...</div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a href="./home.html" class="nav-item active">
    <span class="nav-icon">🏠</span> Home
  </a>
  <a href="./journal.html" class="nav-item">
    <span class="nav-icon">✍️</span> Write
  </a>
  <a href="./dashboard.html" class="nav-item">
    <span class="nav-icon">📊</span> Stats
  </a>
  <a href="./history.html" class="nav-item">
    <span class="nav-icon">📋</span> History
  </a>
  <a href="./chat.html" class="nav-item">
    <span class="nav-icon">🤖</span> Chat
  </a>
</nav>

<script type="module">
  import { getDashboard, getJournals } from '../js/api.js';
  import { requireAuth, getUser, logout } from '../js/auth.js';
  import { getEmotionEmoji, formatDate } from '../js/utils.js';

  // Protect page
  requireAuth();

  // Show greeting
  const user = getUser();
  if (user) {
    document.getElementById('greeting').textContent = `Hello, ${user.name} 👋`;
    document.getElementById('greeting-sub').textContent =
      `${new Date().toDateString()} — How are you feeling?`;
  }

  // Mood selector
  window.selectMood = (btn, mood) => {
    document.querySelectorAll('.emoji-btn')
      .forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };

  // Logout
  window.handleLogout = () => { logout(); };

  // Load stats
  const loadStats = async () => {
    try {
      const data = await getDashboard();
      document.getElementById('total-entries').textContent =
        data.totalEntries || 0;
      document.getElementById('avg-sentiment').textContent =
        data.averageSentiment > 0
          ? `+${data.averageSentiment}`
          : data.averageSentiment || 0;
      document.getElementById('dominant-emotion').textContent =
        getEmotionEmoji(data.dominantEmotion) + ' ' +
        (data.dominantEmotion || '-');
      document.getElementById('positive-days').textContent =
        data.totalEntries
          ? `${Math.round((data.sentimentSplit?.Positive || 0) / data.totalEntries * 100)}%`
          : '0%';
    } catch (e) {
      console.error('Stats error:', e);
    }
  };

  // Load recent entries
  const loadRecentEntries = async () => {
    const container = document.getElementById('recent-entries');
    try {
      const journals = await getJournals();
      if (!journals.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>No entries yet.<br/>Write your first journal!</p>
          </div>`;
        return;
      }
      container.innerHTML = journals.slice(0, 5).map(j => `
        <a href="./history.html" class="entry-item">
          <span class="entry-emoji">${getEmotionEmoji(j.primaryEmotion)}</span>
          <div class="entry-info">
            <div class="entry-summary">
              ${j.summary || j.text.slice(0, 60)}
            </div>
            <div class="entry-date">${formatDate(j.createdAt)}</div>
          </div>
          <span class="entry-sentiment sentiment-${(j.sentimentLabel || 'neutral').toLowerCase()}">
            ${j.sentimentLabel || 'Neutral'}
          </span>
        </a>`).join('');
    } catch (e) {
      container.innerHTML =
        '<div class="loader">Failed to load entries.</div>';
    }
  };

  loadStats();
  loadRecentEntries();
</script>

</body>
</html>
